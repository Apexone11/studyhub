<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient — StudyHub brand -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>

    <!-- Subtle inner light for depth -->
    <radialGradient id="innerLight" cx="0.4" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#1e40af" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- UMBC gold gradient -->
    <linearGradient id="umbc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>

    <!-- Logo glow -->
    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Warm ambient glow (gold + blue blend) -->
    <radialGradient id="ambientGlow" cx="0.5" cy="0.35" r="0.35">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#innerLight)"/>

  <!-- Subtle border -->
  <rect x="1.5" y="1.5" width="509" height="509" rx="107" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

  <!-- Ambient glow -->
  <rect width="512" height="512" rx="108" fill="url(#ambientGlow)"/>

  <!-- ═══ Fork tree logo — hero element ═══ -->
  <g transform="translate(256, 185) scale(3.8)" filter="url(#logoGlow)">
    <!-- trunk -->
    <line x1="0" y1="18" x2="0" y2="4" stroke="#3b82f6" stroke-width="2.6" stroke-linecap="round"/>

    <!-- primary fork arms -->
    <path d="M0 4 Q0 -4 -10 -11" stroke="#3b82f6" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M0 4 Q0 -4 10 -11" stroke="#3b82f6" stroke-width="2.2" fill="none" stroke-linecap="round"/>

    <!-- secondary fork arms -->
    <path d="M-10 -11 Q-14 -16 -17 -19" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M-10 -11 Q-10 -16 -7 -19" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M10 -11 Q7 -16 7 -19" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M10 -11 Q13 -16 17 -19" stroke="#60a5fa" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- primary nodes -->
    <circle cx="0" cy="18" r="3.8" fill="#1d4ed8" stroke="#3b82f6" stroke-width="1.2"/>
    <circle cx="0" cy="4" r="3" fill="#3b82f6"/>
    <circle cx="-10" cy="-11" r="3" fill="#3b82f6"/>
    <circle cx="10" cy="-11" r="3" fill="#3b82f6"/>

    <!-- leaf nodes -->
    <circle cx="-17" cy="-19" r="2" fill="#60a5fa"/>
    <circle cx="-7" cy="-19" r="2" fill="#60a5fa"/>
    <circle cx="7" cy="-19" r="2" fill="#60a5fa"/>
    <circle cx="17" cy="-19" r="2" fill="#60a5fa"/>

    <!-- mortarboard cap -->
    <rect x="-7.5" y="20.5" width="15" height="2.8" rx="1.4" fill="#f59e0b"/>
    <rect x="-1.4" y="17.8" width="2.8" height="3.5" rx="0.8" fill="#f59e0b"/>
    <circle cx="0" cy="17.2" r="1.4" fill="#fbbf24"/>
  </g>

  <!-- ═══ Wordmark ═══ -->
  <text x="256" y="360" text-anchor="middle" font-family="'Plus Jakarta Sans', -apple-system, system-ui, sans-serif" font-weight="800" font-size="66" fill="white" letter-spacing="-3">Study<tspan fill="#3b82f6">Hub</tspan></text>

  <!-- ═══ UMBC badge — gold pill, clean typography ═══ -->
  <rect x="168" y="382" width="176" height="36" rx="18" fill="url(#umbc)"/>
  <text x="256" y="406" text-anchor="middle" font-family="'Plus Jakarta Sans', -apple-system, system-ui, sans-serif" font-weight="800" font-size="15" fill="#0f172a" letter-spacing="2.5">UMBC RETRIEVERS</text>

  <!-- University name — quiet, tertiary -->
  <text x="256" y="454" text-anchor="middle" font-family="'Plus Jakarta Sans', -apple-system, system-ui, sans-serif" font-weight="500" font-size="16" fill="rgba(148,163,184,0.6)" letter-spacing="0.3">University of Maryland, Baltimore County</text>
</svg>
