<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StudyHub Discord Banner - General</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 960px;
  height: 540px;
  overflow: hidden;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.banner {
  width: 960px;
  height: 540px;
  background: linear-gradient(160deg, #0f172a 0%, #1e3a5f 55%, #1e40af 100%);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Floating orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  pointer-events: none;
}
.orb-1 { width: 400px; height: 400px; top: -100px; left: -80px; background: rgba(59,130,246,0.15); }
.orb-2 { width: 300px; height: 300px; bottom: -60px; right: -40px; background: rgba(139,92,246,0.12); }
.orb-3 { width: 200px; height: 200px; top: 40%; left: 60%; background: rgba(16,185,129,0.08); }

/* Grid pattern overlay */
.grid-overlay {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
}

.content {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 700px;
}

/* Logo icon inline with text */
.logo-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  margin-bottom: 14px;
}

.logo-icon svg {
  display: block;
}

.logo {
  font-size: 86px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -3px;
  line-height: 1;
}
.logo span { color: #3b82f6; }

.tagline {
  font-size: 28px;
  font-weight: 600;
  background: linear-gradient(90deg, #60a5fa, #a78bfa);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 24px;
}

.subtitle {
  font-size: 18px;
  color: rgba(255,255,255,0.6);
  line-height: 1.6;
  max-width: 560px;
  margin: 0 auto 30px;
}

.cta-row {
  display: flex;
  gap: 16px;
  justify-content: center;
  align-items: center;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 24px;
  border-radius: 100px;
  font-weight: 700;
  font-size: 15px;
}
.badge-blue {
  background: rgba(59,130,246,0.2);
  border: 1px solid rgba(59,130,246,0.4);
  color: #93c5fd;
}
.badge-white {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.8);
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #3b82f6;
}

/* Floating feature icons */
.float-icon {
  position: absolute;
  width: 52px;
  height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
}

.fi-1 { top: 60px; left: 60px; background: rgba(59,130,246,0.2); }
.fi-2 { top: 80px; right: 80px; background: rgba(139,92,246,0.2); }
.fi-3 { bottom: 80px; left: 100px; background: rgba(16,185,129,0.2); }
.fi-4 { bottom: 60px; right: 60px; background: rgba(245,158,11,0.2); }
.fi-5 { top: 200px; left: 30px; background: rgba(244,63,94,0.15); }
.fi-6 { top: 180px; right: 40px; background: rgba(59,130,246,0.15); }
</style>
</head>
<body>
<div class="banner">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="grid-overlay"></div>

  <!-- Floating feature icons -->
  <div class="float-icon fi-1"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 3 L15 3 Q17 3 17 5 L17 21 Q17 23 15 23 L7 23 Q5 23 5 21 Z" stroke="#93c5fd" stroke-width="1.8" stroke-linejoin="round"/><line x1="11" y1="17" x2="11" y2="14" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/><path d="M11 14 Q11 12 9 11" stroke="#93c5fd" stroke-width="1.3" fill="none" stroke-linecap="round"/><path d="M11 14 Q11 12 13 11" stroke="#93c5fd" stroke-width="1.3" fill="none" stroke-linecap="round"/><circle cx="11" cy="14" r="1.2" fill="#93c5fd"/><circle cx="9" cy="11" r="1" fill="#93c5fd"/><circle cx="13" cy="11" r="1" fill="#93c5fd"/></svg></div>
  <div class="float-icon fi-2"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="17" rx="2.5" stroke="#c4b5fd" stroke-width="1.8"/><path d="M9 5 L9 3 Q9 2 10 2 L14 2 Q15 2 15 3 L15 5" stroke="#c4b5fd" stroke-width="1.5" stroke-linecap="round"/><path d="M8 13 Q10 16 12 17 Q14 14 17 10" stroke="#c4b5fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div class="float-icon fi-3"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><line x1="12" y1="19" x2="12" y2="14" stroke="#6ee7b7" stroke-width="1.8" stroke-linecap="round"/><path d="M12 14 Q12 9 7 6" stroke="#6ee7b7" stroke-width="1.6" fill="none" stroke-linecap="round"/><path d="M12 14 Q12 9 17 6" stroke="#6ee7b7" stroke-width="1.6" fill="none" stroke-linecap="round"/><circle cx="12" cy="19" r="2.2" stroke="#6ee7b7" stroke-width="1.5"/><circle cx="12" cy="14" r="2" fill="#6ee7b7"/><circle cx="7" cy="6" r="2" fill="#6ee7b7"/><circle cx="17" cy="6" r="2" fill="#6ee7b7"/></svg></div>
  <div class="float-icon fi-4"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2.5 L14.8 9.3 L22 9.8 L16.8 14.3 L18.5 21.5 L12 17.8 L5.5 21.5 L7.2 14.3 L2 9.8 L9.2 9.3 Z" stroke="#fcd34d" stroke-width="1.8" stroke-linejoin="round"/></svg></div>
  <div class="float-icon fi-5"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><line x1="7" y1="2" x2="7" y2="22" stroke="#93c5fd" stroke-width="1.4" stroke-linecap="round"/><rect x="7" y="2" width="13" height="20" rx="2" stroke="#93c5fd" stroke-width="1.8"/><circle cx="7" cy="7" r="1" fill="#93c5fd"/><circle cx="7" cy="12" r="1" fill="#93c5fd"/><circle cx="7" cy="17" r="1" fill="#93c5fd"/><line x1="10" y1="8" x2="17" y2="8" stroke="#93c5fd" stroke-width="1.3" stroke-linecap="round"/><line x1="10" y1="12" x2="17" y2="12" stroke="#93c5fd" stroke-width="1.3" stroke-linecap="round"/><line x1="10" y1="16" x2="14" y2="16" stroke="#93c5fd" stroke-width="1.3" stroke-linecap="round"/></svg></div>
  <div class="float-icon fi-6"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 3 L13.7 8.3 L19 10 L13.7 11.7 L12 17 L10.3 11.7 L5 10 L10.3 8.3 Z" stroke="#93c5fd" stroke-width="1.7" stroke-linejoin="round" fill="none"/><path d="M18.5 3.5 L19.3 5.7 L21.5 6.5 L19.3 7.3 L18.5 9.5 L17.7 7.3 L15.5 6.5 L17.7 5.7 Z" fill="#93c5fd"/></svg></div>

  <div class="content">
    <!-- Logo icon + wordmark side by side -->
    <div class="logo-row">
      <div class="logo-icon">
        <svg width="72" height="72" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="28" cy="28" r="26" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
          <line x1="28" y1="46" x2="28" y2="32" stroke="#3b82f6" stroke-width="2.8" stroke-linecap="round"/>
          <path d="M28 32 Q28 24 18 17" stroke="#3b82f6" stroke-width="2.4" fill="none" stroke-linecap="round"/>
          <path d="M28 32 Q28 24 38 17" stroke="#3b82f6" stroke-width="2.4" fill="none" stroke-linecap="round"/>
          <path d="M18 17 Q14 12 11 9" stroke="#60a5fa" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          <path d="M18 17 Q18 12 21 9" stroke="#60a5fa" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          <path d="M38 17 Q35 12 35 9" stroke="#60a5fa" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          <path d="M38 17 Q41 12 45 9" stroke="#60a5fa" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          <circle cx="28" cy="46" r="4" fill="#1d4ed8" stroke="#3b82f6" stroke-width="1.5"/>
          <circle cx="28" cy="32" r="3.2" fill="#3b82f6"/>
          <circle cx="18" cy="17" r="3.2" fill="#3b82f6"/>
          <circle cx="38" cy="17" r="3.2" fill="#3b82f6"/>
          <circle cx="11" cy="9" r="2.2" fill="#60a5fa"/>
          <circle cx="21" cy="9" r="2.2" fill="#60a5fa"/>
          <circle cx="35" cy="9" r="2.2" fill="#60a5fa"/>
          <circle cx="45" cy="9" r="2.2" fill="#60a5fa"/>
          <rect x="20" y="48.5" width="16" height="3" rx="1.5" fill="#f59e0b"/>
          <rect x="26.5" y="45.5" width="3" height="4" rx="1" fill="#f59e0b"/>
          <circle cx="28" cy="45" r="1.5" fill="#fbbf24"/>
        </svg>
      </div>
      <div class="logo">Study<span>Hub</span></div>
    </div>
    <div class="tagline">The GitHub of Studying</div>
    <div class="subtitle">
      Create, share, fork &amp; improve study materials together.
      Free. No paywalls. Built by students, for students.
    </div>
    <div class="cta-row">
      <div class="badge badge-blue"><span class="dot"></span> getstudyhub.net</div>
      <div class="badge badge-white">Join the Community</div>
    </div>
  </div>
</div>
</body>
</html>
