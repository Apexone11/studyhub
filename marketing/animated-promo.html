<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StudyHub Animated Promo</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 960px;
  height: 540px;
  overflow: hidden;
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #0f172a;
}

.scene {
  width: 960px;
  height: 540px;
  position: relative;
  overflow: hidden;
  background: linear-gradient(160deg, #0f172a 0%, #1e3a5f 55%, #1e40af 100%);
}

/* Animated background grid */
.grid-bg {
  position: absolute;
  inset: -50px;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridScroll 20s linear infinite;
}

@keyframes gridScroll {
  0% { transform: translate(0, 0); }
  100% { transform: translate(50px, 50px); }
}

/* Pulsing orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  pointer-events: none;
}

.orb-1 {
  width: 400px; height: 400px;
  top: -100px; left: -80px;
  background: rgba(59,130,246,0.2);
  animation: orbPulse1 4s ease-in-out infinite;
}

.orb-2 {
  width: 300px; height: 300px;
  bottom: -80px; right: -60px;
  background: rgba(139,92,246,0.15);
  animation: orbPulse2 5s ease-in-out infinite;
}

.orb-3 {
  width: 250px; height: 250px;
  top: 40%; left: 50%;
  background: rgba(16,185,129,0.1);
  animation: orbPulse3 6s ease-in-out infinite;
}

@keyframes orbPulse1 {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.7; }
}
@keyframes orbPulse2 {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.2); opacity: 0.6; }
}
@keyframes orbPulse3 {
  0%, 100% { transform: scale(1) translate(0, 0); opacity: 1; }
  50% { transform: scale(1.15) translate(-20px, -10px); opacity: 0.8; }
}

/* Floating particles */
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(59,130,246,0.6);
  animation: particleFloat linear infinite;
}

.p1 { left: 10%; animation-duration: 8s; animation-delay: 0s; }
.p2 { left: 25%; animation-duration: 10s; animation-delay: -2s; background: rgba(139,92,246,0.5); }
.p3 { left: 40%; animation-duration: 7s; animation-delay: -4s; }
.p4 { left: 55%; animation-duration: 9s; animation-delay: -1s; background: rgba(16,185,129,0.5); }
.p5 { left: 70%; animation-duration: 11s; animation-delay: -3s; }
.p6 { left: 85%; animation-duration: 8s; animation-delay: -5s; background: rgba(245,158,11,0.5); }
.p7 { left: 15%; animation-duration: 12s; animation-delay: -6s; width: 3px; height: 3px; }
.p8 { left: 60%; animation-duration: 9s; animation-delay: -7s; width: 5px; height: 5px; background: rgba(139,92,246,0.4); }

@keyframes particleFloat {
  0% { bottom: -10px; opacity: 0; }
  10% { opacity: 0.8; }
  90% { opacity: 0.8; }
  100% { bottom: 550px; opacity: 0; }
}

/* Center content */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
}

/* Step 0: Logo icon entrance */
.logo-icon {
  opacity: 0;
  transform: scale(0.3);
  animation: iconEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
  margin-bottom: 12px;
}

@keyframes iconEnter {
  0% { opacity: 0; transform: scale(0.3); }
  100% { opacity: 1; transform: scale(1); }
}

/* Step 1: Logo text entrance */
.logo-text {
  font-size: 100px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -4px;
  line-height: 1;
  opacity: 0;
  transform: scale(0.6);
  animation: logoEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
}
.logo-text span { color: #3b82f6; }

@keyframes logoEnter {
  0% { opacity: 0; transform: scale(0.6); }
  100% { opacity: 1; transform: scale(1); }
}

/* Logo glow ring */
.logo-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 300px;
  height: 300px;
  border-radius: 50%;
  border: 2px solid rgba(59,130,246,0.3);
  opacity: 0;
  animation: glowRing 1.2s ease-out 0.6s forwards;
}

@keyframes glowRing {
  0% { opacity: 0; width: 100px; height: 100px; border-width: 4px; }
  50% { opacity: 0.6; }
  100% { opacity: 0; width: 500px; height: 500px; border-width: 1px; }
}

/* Step 2: Tagline */
.tagline {
  font-size: 30px;
  font-weight: 700;
  background: linear-gradient(90deg, #60a5fa, #a78bfa);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeSlideUp 0.6s ease-out 1.3s forwards;
  margin-top: 12px;
}

@keyframes fadeSlideUp {
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* Step 3: Feature pills */
.pills {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 28px;
  max-width: 700px;
}

.pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 100px;
  font-size: 15px;
  font-weight: 700;
  opacity: 0;
  transform: translateY(15px) scale(0.9);
  backdrop-filter: blur(4px);
}

.pill-1 {
  background: rgba(59,130,246,0.15);
  border: 1px solid rgba(59,130,246,0.3);
  color: #93c5fd;
  animation: pillPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) 1.9s forwards;
}
.pill-2 {
  background: rgba(16,185,129,0.15);
  border: 1px solid rgba(16,185,129,0.3);
  color: #6ee7b7;
  animation: pillPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) 2.1s forwards;
}
.pill-3 {
  background: rgba(139,92,246,0.15);
  border: 1px solid rgba(139,92,246,0.3);
  color: #c4b5fd;
  animation: pillPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) 2.3s forwards;
}
.pill-4 {
  background: rgba(245,158,11,0.15);
  border: 1px solid rgba(245,158,11,0.3);
  color: #fcd34d;
  animation: pillPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) 2.5s forwards;
}
.pill-5 {
  background: rgba(244,63,94,0.15);
  border: 1px solid rgba(244,63,94,0.3);
  color: #fda4af;
  animation: pillPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) 2.7s forwards;
}
.pill-6 {
  background: rgba(59,130,246,0.15);
  border: 1px solid rgba(59,130,246,0.3);
  color: #93c5fd;
  animation: pillPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) 2.9s forwards;
}

@keyframes pillPop {
  0% { opacity: 0; transform: translateY(15px) scale(0.9); }
  60% { transform: translateY(-3px) scale(1.03); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* Step 4: CTA */
.cta {
  margin-top: 36px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeSlideUp 0.7s ease-out 3.3s forwards;
}

.cta-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 40px;
  border-radius: 16px;
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  color: #fff;
  font-weight: 800;
  font-size: 20px;
  text-decoration: none;
  box-shadow: 0 8px 30px rgba(59,130,246,0.5);
  animation: ctaPulse 2s ease-in-out 4.2s infinite;
}

@keyframes ctaPulse {
  0%, 100% { box-shadow: 0 8px 30px rgba(59,130,246,0.5); transform: scale(1); }
  50% { box-shadow: 0 12px 50px rgba(59,130,246,0.7); transform: scale(1.02); }
}

.cta-url {
  margin-top: 12px;
  font-size: 16px;
  color: rgba(255,255,255,0.5);
  font-weight: 600;
  opacity: 0;
  animation: fadeSlideUp 0.5s ease-out 3.7s forwards;
}

/* Floating cards in background */
.float-card {
  position: absolute;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(2px);
  padding: 14px;
  z-index: 1;
  opacity: 0;
}

.fc-1 {
  width: 160px; height: 100px;
  top: 40px; left: 40px;
  animation: cardAppear 0.5s ease 1.5s forwards, floatCard 6s ease-in-out 2s infinite;
}
.fc-2 {
  width: 140px; height: 90px;
  top: 50px; right: 50px;
  animation: cardAppear 0.5s ease 1.7s forwards, floatCard 7s ease-in-out 2.2s infinite;
}
.fc-3 {
  width: 150px; height: 85px;
  bottom: 50px; left: 50px;
  animation: cardAppear 0.5s ease 1.9s forwards, floatCard 5s ease-in-out 2.4s infinite;
}
.fc-4 {
  width: 130px; height: 95px;
  bottom: 40px; right: 40px;
  animation: cardAppear 0.5s ease 2.1s forwards, floatCard 8s ease-in-out 2.6s infinite;
}

@keyframes cardAppear {
  0% { opacity: 0; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1); }
}

@keyframes floatCard {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
}

.fc-line {
  height: 3px;
  border-radius: 2px;
  margin-bottom: 6px;
}
.fc-line-1 { width: 70%; background: rgba(59,130,246,0.3); }
.fc-line-2 { width: 90%; background: rgba(255,255,255,0.08); }
.fc-line-3 { width: 50%; background: rgba(255,255,255,0.06); }
.fc-line-4 { width: 80%; background: rgba(139,92,246,0.2); }
.fc-line-5 { width: 60%; background: rgba(16,185,129,0.25); }

.fc-icon {
  font-size: 18px;
  margin-bottom: 8px;
}
</style>
</head>
