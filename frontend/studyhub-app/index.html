    />
    <meta name="theme-color" content="#2563eb" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="StudyHub" />
    <meta property="og:title" content="StudyHub — The GitHub of Studying" />
    <meta
      property="og:description"
      content="Fork study sheets, take practice tests, and collaborate with classmates. Free for students forever."
    />
    <meta property="og:url" content="https://getstudyhub.org" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="StudyHub — The GitHub of Studying" />
    <meta
      name="twitter:description"
      content="Fork study sheets, collaborate with classmates. Free for students."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-256.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      integrity="sha384-/o6I2CkkWC//PSjvWC/eYN7l3xM3tJm8ZzVkCOfp//W05QcE3mlGskpoHB6XqI+B"
      crossorigin="anonymous"
    />
    <!-- Analytics and consent — skip on Capacitor native shell -->
    <script type="text/javascript">
      ;(function () {
        // Detect Capacitor native shell — skip all web analytics/consent banners
        var isNative =
          window.location.protocol === 'capacitor:' ||
          document.URL.indexOf('capacitor://') === 0 ||
          // Capacitor WebView serves at http(s)://localhost/ with NO port.
          // The web dev server is http://localhost:5173, so gate on port === ''.
          ((window.location.protocol === 'https:' || window.location.protocol === 'http:') &&
            window.location.hostname === 'localhost' &&
            window.location.port === '') ||
          navigator.userAgent.indexOf('StudyHub') > -1
        if (isNative) {
          window.__SH_NATIVE__ = true
          return
        }

        // Termly Consent Banner — async + defer so it never blocks first paint.
        // The CSP allows *.termly.io (script-src + connect-src + frame-src +
        // style-src + font-src) so Termly's resource blocker, status checks,
        // and persistence beacons can all reach their backend. Without the
        // wildcard, secondary subdomains (cdn.termly.io, beacon.min.js, etc.)
        // were blocked by CSP and the banner couldn't persist the user's
        // consent choice — so it re-appeared on every page load.
        var ts = document.createElement('script')
        ts.type = 'text/javascript'
        ts.async = true
        ts.defer = true
        ts.src =
          'https://app.termly.io/resource-blocker/f44c5c0c-a4fc-4ca4-980b-89068e5aeb41?autoBlock=on'
        document.head.appendChild(ts)

        // Microsoft Clarity
        ;(function (c, l, a, r, i, t, y) {
          c[a] =
            c[a] ||
            function () {
              ;(c[a].q = c[a].q || []).push(arguments)
            }
          t = l.createElement(r)
          t.async = 1
          t.src = 'https://www.clarity.ms/tag/' + i
          y = l.getElementsByTagName(r)[0]
          y.parentNode.insertBefore(t, y)
        })(window, document, 'clarity', 'script', 'vv9kfyhqe1')

        // Google tag (gtag.js)
        var gs = document.createElement('script')
        gs.async = true
        gs.src = 'https://www.googletagmanager.com/gtag/js?id=AW-18019301841'
        document.head.appendChild(gs)
        window.dataLayer = window.dataLayer || []
        function gtag() {
          window.dataLayer.push(arguments)
        }
        window.gtag = gtag
        gtag('js', new Date())
        gtag('config', 'AW-18019301841')
      })()
    </script>
    <title>StudyHub</title>
    <script>
      // Apply saved theme before React mounts to prevent light-mode flash
      ;(function () {
        try {
          var t = localStorage.getItem('sh-theme') || 'system'
          var dark =
            t === 'dark' ||
            (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.setAttribute('data-theme', 'dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="/runtime-config.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
